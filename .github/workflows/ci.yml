name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Check import
        run: uv run python -c "from azure_pricing_mcp.server import mcp; print('OK:', mcp.name)"

      - name: Test MCP protocol handshake
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.1"}}}' \
            | uv run azure-pricing-mcp 2>/dev/null \
            | python -c "import sys,json; r=json.loads(sys.stdin.readline()); assert r['result']['serverInfo']['name']=='Azure Pricing'; print('Handshake OK')"

      - name: Test tools/list
        run: |
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.1"}}}\n{"jsonrpc":"2.0","method":"notifications/initialized"}\n{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | uv run azure-pricing-mcp 2>/dev/null \
            | python -c "
          import sys, json
          for line in sys.stdin:
              line = line.strip()
              if not line:
                  continue
              try:
                  r = json.loads(line)
                  if 'result' in r and 'tools' in r.get('result', {}):
                      tools = [t['name'] for t in r['result']['tools']]
                      assert 'search_prices' in tools
                      assert 'estimate_cost' in tools
                      assert 'compare_regions' in tools
                      assert 'list_services' in tools
                      assert 'list_regions' in tools
                      print(f'Tools OK: {tools}')
                      break
              except json.JSONDecodeError:
                  continue
          "

      - name: Build package
        run: uv build

      - name: Verify package
        run: |
          ls -la dist/
          uv run python -m zipfile -l dist/*.whl | head -20
